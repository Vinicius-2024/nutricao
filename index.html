<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#10b981">
    <meta name="description" content="NutriVida - Educação Alimentar para adultos e crianças. Nutrição personalizada com abordagem familiar e humanizada.">
    <title>NutriVida | Educação Alimentar para Adultos e Crianças</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- React e ReactDOM CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    
    <!-- Babel para JSX -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: white;
            color: #1f2937;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f3f4f6;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #10b981;
            border-radius: 9999px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #059669;
        }
        
        /* Animações */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fadeInUp {
            animation: fadeInUp 0.6s ease-out;
        }
        
        /* Container customizado */
        .container-custom {
            max-width: 1280px;
            margin-left: auto;
            margin-right: auto;
            padding-left: 1rem;
            padding-right: 1rem;
        }
        
        @media (min-width: 768px) {
            .container-custom {
                padding-left: 1.5rem;
                padding-right: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        // ============================================
        // COMPONENTE HEADER
        // ============================================
        const Header = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navItems = ['Início', 'Sobre', 'Serviços', 'Público', 'Depoimentos', 'Contato'];

            return (
                <header className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-white shadow-lg py-2' : 'bg-white/95 backdrop-blur-sm py-4'}`}>
                    <div className="container-custom flex justify-between items-center">
                        <div className="flex items-center space-x-2">
                            <div className="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center">
                                <span className="text-white font-bold text-xl">N</span>
                            </div>
                            <span className="text-2xl font-bold text-gray-800">Nutri<span className="text-emerald-600">Vida</span></span>
                        </div>

                        <nav className="hidden md:flex space-x-8">
                            {navItems.map((item) => (
                                <a key={item} href={`#${item.toLowerCase()}`} className="text-gray-700 hover:text-emerald-600 transition-colors font-medium">
                                    {item}
                                </a>
                            ))}
                        </nav>

                        <button className="hidden md:block bg-emerald-600 text-white px-6 py-2 rounded-full hover:bg-emerald-700 transition-colors shadow-md">
                            Agendar Consulta
                        </button>

                        <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                            <svg className="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={isMenuOpen ? "M6 18L18 6M6 6l12 12" : "M4 6h16M4 12h16M4 18h16"} />
                            </svg>
                        </button>
                    </div>

                    {isMenuOpen && (
                        <div className="md:hidden bg-white shadow-lg py-4 px-4">
                            {navItems.map((item) => (
                                <a key={item} href={`#${item.toLowerCase()}`} className="block py-2 text-gray-700 hover:text-emerald-600 transition-colors" onClick={() => setIsMenuOpen(false)}>
                                    {item}
                                </a>
                            ))}
                            <button className="w-full mt-4 bg-emerald-600 text-white px-6 py-2 rounded-full hover:bg-emerald-700 transition-colors">
                                Agendar Consulta
                            </button>
                        </div>
                    )}
                </header>
            );
        };

        // ============================================
        // COMPONENTE HERO
        // ============================================
        const Hero = () => {
            return (
                <section id="início" className="pt-32 pb-20 md:pt-40 md:pb-28 bg-gradient-to-br from-emerald-50 via-white to-teal-50">
                    <div className="container-custom">
                        <div className="flex flex-col md:flex-row items-center justify-between gap-12">
                            <div className="md:w-1/2 text-center md:text-left">
                                <div className="inline-block bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full text-sm font-semibold mb-4">
                                    Educação Alimentar que Transforma
                                </div>
                                <h1 className="text-4xl md:text-5xl lg:text-6xl font-bold text-gray-800 mb-6 leading-tight">
                                    Nutrição que <span className="text-emerald-600">conecta</span> adultos e crianças
                                </h1>
                                <p className="text-lg text-gray-600 mb-8 leading-relaxed">
                                    Aprenda a ter uma relação saudável com a comida através de uma abordagem única que respeita suas necessidades e transforma hábitos alimentares para toda a família.
                                </p>
                                <div className="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                                    <button className="bg-emerald-600 text-white px-8 py-3 rounded-full text-lg font-semibold hover:bg-emerald-700 transition-all shadow-lg hover:shadow-xl">
                                        Começar Agora
                                    </button>
                                    <button className="border-2 border-emerald-600 text-emerald-600 px-8 py-3 rounded-full text-lg font-semibold hover:bg-emerald-50 transition-all">
                                        Saiba Mais
                                    </button>
                                </div>
                            </div>
                            <div className="md:w-1/2">
                                <img 
                                    src="imagem/imagem.jpeg.jpeg" 
                                    alt="Nutrição saudável" 
                                    className="rounded-2xl shadow-2xl w-full object-cover"
                                />
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // ============================================
        // COMPONENTE SOBRE
        // ============================================
        const Sobre = () => {
            return (
                <section id="sobre" className="py-20 bg-white">
                    <div className="container-custom">
                        <div className="text-center mb-12">
                            <h2 className="text-3xl md:text-4xl font-bold text-gray-800 mb-4">Sobre Nós</h2>
                            <div className="w-20 h-1 bg-emerald-500 mx-auto"></div>
                        </div>
                        <div className="flex flex-col md:flex-row items-center gap-12">
                            <div className="md:w-1/2">
                                <img 
                                    src="imagens/WhatsApp Image 2026-05-01 at 11.32.45.jpeg" 
                                    alt="Nutricionista" 
                                    className="rounded-2xl shadow-xl w-full object-cover"
                                />
                            </div>
                            <div className="md:w-1/2">
                                <h3 className="text-2xl font-bold text-emerald-600 mb-4">Dra. Indyara Venancio</h3>
                                <p className="text-gray-600 mb-4 leading-relaxed">
                                    Experiência em nutrição clínica e educação alimentar, desenvolvi uma metodologia única que une ciência e empatia para transformar a relação das pessoas com a comida.
                                </p>
                                <p className="text-gray-600 mb-6 leading-relaxed">
                                    Especialista em nutrição infantil e comportamento alimentar, acredito que uma alimentação saudável deve ser prazerosa, acessível e construída em conjunto com cada paciente e sua família.
                                </p>
                                <div className="grid grid-cols-2 gap-4 mb-6">
                                    <div className="flex items-center space-x-2">
                                        <svg className="w-5 h-5 text-emerald-500" fill="currentColor" viewBox="0 0 20 20">
                                            <path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" />
                                        </svg>
                                        <span className="text-gray-700">CRN: 12345</span>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <svg className="w-5 h-5 text-emerald-500" fill="currentColor" viewBox="0 0 20 20">
                                            <path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" />
                                        </svg>
                                        <span className="text-gray-700">Pós-graduada em Nutrição Infantil</span>
                                    </div>
                                </div>
                                <div className="flex space-x-4">
                                    <div className="flex items-center space-x-2">
                                        <svg className="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                        </svg>
                                        <span className="text-gray-600">+300 pacientes atendidos</span>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <svg className="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                        </svg>
                                        <span className="text-gray-600">Satisfação 98%</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // ============================================
        // COMPONENTE SERVIÇOS
        // ============================================
        const Servicos = () => {
            const services = [
                { icon: "👤", title: "Nutrição Adulto", description: "Acompanhamento personalizado para emagrecimento, ganho de massa muscular, nutrição esportiva e doenças crônicas.", color: "from-emerald-400 to-teal-500" },
                { icon: "🧒", title: "Nutrição Infantil", description: "Abordagem lúdica para introdução alimentar, seletividade alimentar, alergias e hábitos saudáveis para crianças.", color: "from-amber-400 to-orange-500" },
                { icon: "👨‍👩‍👧", title: "Educação Familiar", description: "Orientações para toda família comer melhor, planejamento de refeições e estratégias para momentos desafiadores.", color: "from-blue-400 to-indigo-500" },
                { icon: "📋", title: "Avaliação Nutricional", description: "Análise completa de composição corporal, exames bioquímicos e histórico alimentar para diagnóstico preciso.", color: "from-purple-400 to-pink-500" },
                { icon: "🍳", title: "Oficinas Culinárias", description: "Aprenda receitas nutritivas e práticas envolvendo as crianças no preparo das refeições.", color: "from-red-400 to-rose-500" },
                { icon: "💻", title: "Acompanhamento Online", description: "Consultas remotas, materiais exclusivos e suporte contínuo para sua jornada alimentar.", color: "from-cyan-400 to-sky-500" }
            ];

            return (
                <section id="serviços" className="py-20 bg-gray-50">
                    <div className="container-custom">
                        <div className="text-center mb-12">
                            <h2 className="text-3xl md:text-4xl font-bold text-gray-800 mb-4">Nossos Serviços</h2>
                            <div className="w-20 h-1 bg-emerald-500 mx-auto mb-4"></div>
                            <p className="text-gray-600 max-w-2xl mx-auto">Oferecemos abordagens personalizadas para cada fase da vida</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {services.map((service, index) => (
                                <div key={index} className="bg-white rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 overflow-hidden group">
                                    <div className={`h-2 bg-gradient-to-r ${service.color}`}></div>
                                    <div className="p-6">
                                        <div className="text-5xl mb-4">{service.icon}</div>
                                        <h3 className="text-xl font-bold text-gray-800 mb-3">{service.title}</h3>
                                        <p className="text-gray-600 leading-relaxed">{service.description}</p>
                                        <button className="mt-4 text-emerald-600 font-semibold hover:text-emerald-700 transition-colors flex items-center">
                                            Saiba mais
                                            <svg className="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // ============================================
        // COMPONENTE PÚBLICO ALVO
        // ============================================
        const PublicoAlvo = () => {
            const audiences = [
                { title: "Adultos", description: "Busque equilíbrio, emagrecimento saudável ou performance", image: "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
                { title: "Crianças", description: "Aprenda com diversão e desenvolva hábitos para a vida toda", image: "https://images.unsplash.com/photo-1502086223501-7ea6ecd79368?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
                { title: "Famílias", description: "Construa uma alimentação harmoniosa em casa", image: "https://images.unsplash.com/photo-1511798616189-2e435f85d0f9?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" }
            ];

            return (
                <section id="público" className="py-20 bg-white">
                    <div className="container-custom">
                        <div className="text-center mb-12">
                            <h2 className="text-3xl md:text-4xl font-bold text-gray-800 mb-4">Para Quem é Nossa Abordagem</h2>
                            <div className="w-20 h-1 bg-emerald-500 mx-auto"></div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {audiences.map((audience, index) => (
                                <div key={index} className="group relative overflow-hidden rounded-2xl shadow-lg">
                                    <img src={audience.image} alt={audience.title} className="w-full h-80 object-cover transition-transform duration-500 group-hover:scale-110" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent flex flex-col justify-end p-6">
                                        <h3 className="text-2xl font-bold text-white mb-2">{audience.title}</h3>
                                        <p className="text-white/90">{audience.description}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // ============================================
        // COMPONENTE DEPOIMENTOS
        // ============================================
        const Depoimentos = () => {
            const testimonials = [
                { name: "Mariana Silva", role: "Mãe do Pedro, 4 anos", text: "A Dra. Ana transformou a alimentação do meu filho. Ele era muito seletivo e agora experimenta novos alimentos com curiosidade. Metodologia incrível!", rating: 5, image: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80" },
                { name: "Carlos Mendes", role: "Paciente adulto", text: "Perdi 15kg de forma saudável e sem sofrimento. Aprendi a comer de verdade e nunca mais fiz dieta restritiva. Mudou minha vida!", rating: 5, image: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80" },
                { name: "Juliana Costa", role: "Família", text: "As orientações para a família toda foram transformadoras. Hoje temos uma relação muito mais leve com a comida em casa.", rating: 5, image: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80" }
            ];

            return (
                <section id="depoimentos" className="py-20 bg-emerald-50">
                    <div className="container-custom">
                        <div className="text-center mb-12">
                            <h2 className="text-3xl md:text-4xl font-bold text-gray-800 mb-4">O que Dizem Nossos Pacientes</h2>
                            <div className="w-20 h-1 bg-emerald-500 mx-auto"></div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {testimonials.map((testimonial, index) => (
                                <div key={index} className="bg-white rounded-2xl shadow-lg p-6 hover:shadow-xl transition-shadow">
                                    <div className="flex items-center mb-4">
                                        <img src={testimonial.image} alt={testimonial.name} className="w-12 h-12 rounded-full object-cover mr-4" />
                                        <div>
                                            <h4 className="font-bold text-gray-800">{testimonial.name}</h4>
                                            <p className="text-sm text-gray-500">{testimonial.role}</p>
                                        </div>
                                    </div>
                                    <div className="flex mb-3">
                                        {[...Array(testimonial.rating)].map((_, i) => (
                                            <svg key={i} className="w-5 h-5 text-yellow-400 fill-current" viewBox="0 0 20 20">
                                                <path d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.572-.955L10 0l2.939 5.955 6.572.955-4.756 4.635 1.123 6.545z" />
                                            </svg>
                                        ))}
                                    </div>
                                    <p className="text-gray-600 leading-relaxed">"{testimonial.text}"</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // ============================================
        // COMPONENTE CONTATO
        // ============================================
        const Contato = () => {
            const [formData, setFormData] = useState({ nome: '', email: '', telefone: '', mensagem: '' });
            const [isSubmitted, setIsSubmitted] = useState(false);

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                setIsSubmitted(true);
                setTimeout(() => setIsSubmitted(false), 3000);
                setFormData({ nome: '', email: '', telefone: '', mensagem: '' });
            };

            return (
                <section id="contato" className="py-20 bg-white">
                    <div className="container-custom">
                        <div className="text-center mb-12">
                            <h2 className="text-3xl md:text-4xl font-bold text-gray-800 mb-4">Entre em Contato</h2>
                            <div className="w-20 h-1 bg-emerald-500 mx-auto"></div>
                            <p className="text-gray-600 mt-4">Agende sua consulta ou tire suas dúvidas</p>
                        </div>
                        <div className="flex flex-col md:flex-row gap-12">
                            <div className="md:w-1/2">
                                <div className="bg-emerald-50 rounded-2xl p-8">
                                    <h3 className="text-2xl font-bold text-gray-800 mb-6">Informações de Contato</h3>
                                    <div className="space-y-4">
                                        <div className="flex items-center space-x-3">
                                            <div className="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center">
                                                <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                                                </svg>
                                            </div>
                                            <span className="text-gray-700">(11) 97153-7050</span>
                                        </div>
                                        <div className="flex items-center space-x-3">
                                            <div className="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center">
                                                <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                                </svg>
                                            </div>
                                            <span className="text-gray-700">contato@nutrivida.com</span>
                                        </div>
                                        <div className="flex items-center space-x-3">
                                            <div className="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center">
                                                <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                                </svg>
                                            </div>
                                            <span className="text-gray-700">Av. Paulista, 1000 - São Paulo, SP</span>
                                        </div>
                                    </div>
                                    <div className="mt-8 pt-8 border-t border-emerald-200">
                                        <h4 className="font-semibold text-gray-800 mb-3">Horário de Atendimento</h4>
                                        <p className="text-gray-600">Segunda a Sexta: 8h às 20h</p>
                                        <p className="text-gray-600">Sábado: 9h às 13h</p>
                                    </div>
                                </div>
                            </div>
                            <div className="md:w-1/2">
                                <form onSubmit={handleSubmit} className="bg-gray-50 rounded-2xl p-8 shadow-lg">
                                    <div className="mb-4">
                                        <label className="block text-gray-700 font-medium mb-2">Nome Completo</label>
                                        <input type="text" name="nome" value={formData.nome} onChange={handleChange} required className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-emerald-500 transition-colors" />
                                    </div>
                                    <div className="mb-4">
                                        <label className="block text-gray-700 font-medium mb-2">Email</label>
                                        <input type="email" name="email" value={formData.email} onChange={handleChange} required className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-emerald-500 transition-colors" />
                                    </div>
                                    <div className="mb-4">
                                        <label className="block text-gray-700 font-medium mb-2">Telefone</label>
                                        <input type="tel" name="telefone" value={formData.telefone} onChange={handleChange} required className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-emerald-500 transition-colors" />
                                    </div>
                                    <div className="mb-6">
                                        <label className="block text-gray-700 font-medium mb-2">Mensagem</label>
                                        <textarea name="mensagem" value={formData.mensagem} onChange={handleChange} rows="4" required className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-emerald-500 transition-colors"></textarea>
                                    </div>
                                    <button type="submit" className="w-full bg-emerald-600 text-white py-3 rounded-lg font-semibold hover:bg-emerald-700 transition-colors shadow-md">
                                        Enviar Mensagem
                                    </button>
                                    {isSubmitted && (
                                        <div className="mt-4 p-3 bg-emerald-100 text-emerald-700 rounded-lg text-center">
                                            Mensagem enviada com sucesso!
                                        </div>
                                    )}
                                </form>
                            </div>
                        </div>
                    </div>
                </section>
            );

                                        <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
